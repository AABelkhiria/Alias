name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: macos-13
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION | xargs)" >> $GITHUB_OUTPUT

      - name: Build App
        run: make build

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir dmg_root
          cp -R Alias.app dmg_root/
          create-dmg \
            --volname "Alias" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "Alias.app" 150 120 \
            --hide-extension "Alias.app" \
            --app-drop-link 450 120 \
            "Alias.dmg" \
            "dmg_root/"

      - name: Create Tag
        run: |
          git tag v${{ steps.get_version.outputs.VERSION }}
          git push origin v${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: Alias.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
